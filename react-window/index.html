<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>React Window Demo</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: sans-serif; background: #f0f2f5; display: flex; flex-direction: column; align-items: center; padding: 40px 20px; }
        h1 { margin-bottom: 8px; color: #1a1a2e; }
        p { margin-bottom: 24px; color: #555; }
        .list-container { background: #fff; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.1); overflow: hidden; }
        .row {
            display: flex;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid #eee;
            font-size: 14px;
            color: #333;
        }
        .row:nth-child(even) { background: #fafafa; }
        .row-index {
            width: 50px;
            font-weight: bold;
            color: #888;
        }
        .row-label { flex: 1; }
        .row-badge {
            background: #4f46e5;
            color: #fff;
            border-radius: 12px;
            padding: 2px 10px;
            font-size: 12px;
        }
    </style>
</head>
<body>
    <h1>react-window Demo</h1>
    <p>Efficiently rendering 10,000 rows with <strong>List</strong> (react-window v1.8.10)</p>
    <div id="root"></div>

    <!-- Babel for JSX + module support -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script type="text/babel" data-type="module">
        import React from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { List } from 'https://esm.sh/react-window@1.8.10?deps=react@18';

        const ITEM_COUNT = 10_000;
        const ITEM_HEIGHT = 48;
        const LIST_HEIGHT = 500;
        const LIST_WIDTH = 600;

        const categories = ['Alpha', 'Beta', 'Gamma', 'Delta', 'Epsilon'];

        const Row = ({ index, style }) => (
            <div className="row" style={style}>
                <span className="row-index">#{index + 1}</span>
                <span className="row-label">Item {index + 1} — {`Lorem ipsum entry ${index + 1}`}</span>
                <span className="row-badge">{categories[index % categories.length]}</span>
            </div>
        );

        function App() {
            return (
                <div className="list-container">
                    <List
                        height={LIST_HEIGHT}
                        width={LIST_WIDTH}
                        itemCount={ITEM_COUNT}
                        itemSize={ITEM_HEIGHT}
                    >
                        {Row}
                    </List>
                </div>
            );
        }

        createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
